<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读书笔记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Noto+Serif+SC:wght@400;500;600&family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&family=ZCOOL+XiaoWei&family=KaiTi&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2F2ED;
    --surface:#FFFFFF;
    --ink:#22252B;
    --ink-soft:#6B6F76;
    --ink-faint:#9A9D9F;
    --line:#DFDED4;
    --line-soft:#EAE9E0;
    --navy:#2B3A55;
    --navy-soft:#E7EAF0;
    --moss:#4E6B4E;
    --moss-soft:#E7EDE5;
    --gold:#B8862F;
    --gold-soft:#F3E9D6;
    --rose:#8B4049;
    --rose-soft:#F1E2E1;
    --teal:#33636A;
    --teal-soft:#E1EBEA;
    --danger:#A13F3F;
    --radius-s:6px;
    --radius-m:10px;
    --radius-l:14px;
    --shadow: 0 1px 2px rgba(34,37,43,0.04), 0 2px 8px rgba(34,37,43,0.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:900px;
    margin:0 auto;
    padding:24px 20px 60px;
  }
  .serif{ font-family:'Source Serif 4','Noto Serif SC',Georgia,serif; }

  /* header */
  .app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    gap:12px;
    flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:center; gap:8px; }
  .brand-mark{
    width:24px;height:24px;flex:none;
    border-radius:4px;
    background:var(--navy);
    position:relative;
  }
  .brand-mark::before,.brand-mark::after{
    content:"";
    position:absolute;
    top:4px;bottom:4px;
    width:2px;
    background:rgba(255,255,255,0.55);
  }
  .brand-mark::before{ left:8px; }
  .brand-mark::after{ left:12px; }
  .brand h1{
    font-size:16px;
    font-weight:600;
    margin:0;
  }
  .header-actions{
    display:flex;
    align-items:center;
    gap:8px;
    position:relative;
  }
  .user-email-btn{
    font-size:12px;
    color:var(--ink-faint);
    cursor:pointer;
  }
  .user-email-btn:hover{ color:var(--ink); }
  .user-dropdown{
    position:absolute;
    top:100%;
    right:0;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:8px;
    box-shadow:var(--shadow);
    z-index:10;
  }
  .brand .user-email{
    font-size:12px;
    color:var(--ink-faint);
  }
  .logout-btn{ font-size:12px; }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    padding:9px 16px;
    border-radius:var(--radius-s);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .btn:hover{ border-color:var(--ink-faint); background:var(--line-soft); }
  .btn-primary{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  .btn-primary:hover{ background:#1f2b40; border-color:#1f2b40; }
  .btn-ghost{
    border-color:transparent;
    background:transparent;
    padding:9px 10px;
  }
  .btn-ghost:hover{ background:var(--line-soft); }
  .btn-danger{ color:var(--danger); }
  .btn-sm{ padding:6px 12px; font-size:13px; }
  .btn-full{ width:100%; justify-content:center; }
  .icon{ width:14px; height:14px; flex:none; }

  /* library grid */
  .shelf-label{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:12px;
  }
  .shelf-label span{ font-size:12px; color:var(--ink-faint); }
  .shelf-label .motto-display, .shelf-label .motto-empty{
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
    max-width:60%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .shelf-label .motto-display:hover, .shelf-label .motto-empty:hover{ color:var(--ink); }
  .shelf-label .motto-empty{ font-style:italic; }
  .motto-edit-input{
    font-size:13px;
    color:var(--ink);
    border:1px solid var(--navy);
    border-radius:var(--radius-s);
    padding:4px 8px;
    max-width:60%;
    font-family:inherit;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(180px, 1fr));
    gap:12px;
  }
  .book-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:14px 14px 12px 18px;
    cursor:pointer;
    overflow:hidden;
    transition:border-color .15s ease, transform .1s ease;
  }
  .book-card:hover{ border-color:var(--ink-faint); }
  .book-card:active{ transform:scale(0.995); }
  .spine{
    position:absolute; left:0; top:0; bottom:0; width:5px;
  }
  .book-card h3{
    font-size:15px;
    font-weight:600;
    margin:0 0 3px;
    line-height:1.35;
    padding-right:4px;
  }
  .book-card .author{
    font-size:12px;
    color:var(--ink-soft);
    font-style:italic;
    margin:0 0 10px;
    font-family:'Source Serif 4','Noto Serif SC',serif;
  }
  .book-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:11px;
    color:var(--ink-faint);
  }
  .chip{
    font-size:11px;
    padding:2px 7px;
    border-radius:20px;
    background:var(--line-soft);
    color:var(--ink-soft);
  }
  .status-chip{
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
    border:none;
    font-family:inherit;
    cursor:pointer;
  }
  .status-want{ background:var(--gold-soft); color:var(--gold); }
  .status-reading{ background:var(--navy-soft); color:var(--navy); }
  .status-done{ background:var(--moss-soft); color:var(--moss); }

  .progress-track{
    width:100%;
    height:3px;
    border-radius:3px;
    background:var(--line-soft);
    overflow:hidden;
    margin-top:8px;
  }
  .progress-fill{
    height:100%;
    background:var(--navy);
    border-radius:3px;
  }

  /* motto row */
  .motto-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .motto-left{
    flex:1;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .motto-row .motto-display, .motto-row .motto-empty{
    font-size:14px;
    font-family:'KaiTi','STKaiti','楷体',serif;
    font-style:italic;
    color:var(--ink-soft);
    cursor:pointer;
    max-width:100%;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .motto-row .motto-display:hover, .motto-row .motto-empty:hover{ color:var(--ink); }
  .motto-row .motto-empty{ color:var(--ink-faint); }

  /* shelf actions row */
  .shelf-actions{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
  }

  /* filter tabs */
  .filter-tabs{
    display:flex;
    gap:4px;
  }
  .filter-tab{
    font-family:inherit;
    font-size:12px;
    font-weight:500;
    padding:5px 11px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .filter-tab:hover{ border-color:var(--ink-faint); }
  .filter-tab.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }

  /* status selector (used in forms) */
  .status-selector{ display:flex; gap:8px; }
  .status-option{
    flex:1;
    text-align:center;
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    padding:9px 8px;
    border-radius:var(--radius-s);
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .status-option:hover{ border-color:var(--ink-faint); }
  .status-option.active{
    background:var(--navy-soft);
    border-color:var(--navy);
    color:var(--navy);
  }

  /* progress editor on detail page */
  .progress-editor{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
  }
  .progress-editor input[type="range"]{ flex:1; }
  .progress-editor .progress-value{
    font-size:13px;
    font-weight:600;
    color:var(--navy);
    min-width:38px;
    text-align:right;
  }
  .status-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
  }

  /* quote excerpt */
  .chapter-quote{
    border-left:3px solid var(--gold);
    background:var(--gold-soft);
    padding:10px 14px;
    border-radius:0 var(--radius-s) var(--radius-s) 0;
    font-family:'Source Serif 4','Noto Serif SC',serif;
    font-style:italic;
    font-size:14px;
    line-height:1.65;
    color:#5C4419;
    margin:0 0 12px;
    white-space:pre-wrap;
  }

  /* search */
  .search-box{
    position:relative;
    margin-bottom:12px;
  }
  .search-box input{
    width:100%;
    font-family:inherit;
    font-size:13px;
    padding:8px 12px 8px 34px;
    border:1px solid var(--line);
    border-radius:var(--radius-s);
    background:var(--surface);
    color:var(--ink);
  }
  .search-box input:focus{ outline:none; border-color:var(--navy); }
  .search-box .search-icon{
    position:absolute;
    left:10px; top:50%;
    transform:translateY(-50%);
    width:14px; height:14px;
    color:var(--ink-faint);
    pointer-events:none;
  }
  .search-box .search-clear{
    position:absolute;
    right:10px; top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--ink-faint);
    cursor:pointer;
    padding:4px;
    display:flex;
  }
  .search-results{ display:flex; flex-direction:column; gap:8px; }
  .search-hit{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:14px 16px;
    cursor:pointer;
  }
  .search-hit:hover{ border-color:var(--ink-faint); }
  .search-hit .hit-book{
    font-size:12px;
    color:var(--ink-faint);
    margin:0 0 3px;
  }
  .search-hit h4{
    font-size:15px;
    font-weight:600;
    margin:0 0 4px;
  }
  .search-hit p{
    font-size:13px;
    color:var(--ink-soft);
    margin:0;
    line-height:1.55;
  }
  .search-hit mark{
    background:var(--gold-soft);
    color:#5C4419;
    padding:0 2px;
    border-radius:2px;
  }

  /* empty state */
  .empty{
    text-align:center;
    padding:72px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius-l);
  }
  .empty h2{ font-size:18px; font-weight:600; margin:0 0 6px; }
  .empty p{ font-size:14px; color:var(--ink-soft); margin:0 0 20px; }

  /* forms / panels */
  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:16px;
    margin-bottom:14px;
  }
  .panel h3{
    font-size:14px;
    font-weight:600;
    margin:0 0 12px;
  }
  .field{ margin-bottom:10px; }
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:4px;
    font-weight:500;
  }
  .field input, .field textarea{
    width:100%;
    font-family:inherit;
    font-size:13px;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:var(--radius-s);
    background:#FDFDFB;
    color:var(--ink);
    resize:vertical;
  }
  .field textarea{ min-height:120px; line-height:1.5; }
  .field input:focus, .field textarea:focus{
    outline:none;
    border-color:var(--navy);
    background:#fff;
  }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .panel-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:12px;
    margin-top:16px;
  }

  /* book detail */
  .detail-header{ margin-bottom:24px; }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    padding:6px 0;
    margin-bottom:16px;
    font-family:inherit;
  }
  .back-link:hover{ color:var(--ink); }
  .detail-title-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .detail-title-row h2{
    font-size:26px;
    font-weight:600;
    margin:0 0 4px;
  }
  .detail-title-row .author{
    font-size:14px;
    font-style:italic;
    color:var(--ink-soft);
    font-family:'Source Serif 4','Noto Serif SC',serif;
    margin:0;
  }
  .detail-actions{ display:flex; gap:8px; flex:none; }

  .section-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:32px 0 14px;
  }
  .section-label h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    font-weight:600;
    margin:0;
  }

  .chapter-list{ display:flex; flex-direction:column; gap:8px; }
  .chapter-row{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    overflow:hidden;
  }
  .chapter-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
  }
  .chapter-num{
    flex:none;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--navy-soft);
    color:var(--navy);
    font-size:12px;
    font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .chapter-head-text{ flex:1; min-width:0; }
  .chapter-head-text h4{
    font-size:15px;
    font-weight:600;
    margin:0 0 2px;
  }
  .chapter-head-text p{
    font-size:12.5px;
    color:var(--ink-faint);
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chevron{
    flex:none;
    width:16px;height:16px;
    color:var(--ink-faint);
    transition:transform .15s ease;
  }
  .chapter-row.open .chevron{ transform:rotate(180deg); }
  .chapter-body{
    display:none;
    padding:0 16px 16px 54px;
    border-top:1px solid var(--line-soft);
  }
  .chapter-row.open .chapter-body{ display:block; padding-top:12px;}
  .chapter-content{
    font-size:14.5px;
    line-height:1.75;
    color:var(--ink);
    white-space:pre-wrap;
    font-family:'Source Serif 4','Noto Serif SC',serif;
    margin:0 0 12px;
  }
  .chapter-content.empty-note{
    color:var(--ink-faint);
    font-style:italic;
    font-family:'Inter','Noto Sans SC',sans-serif;
  }
  .chapter-body-actions{ display:flex; gap:8px; }

  .drag-handle{
    flex:none;
    width:16px; height:16px;
    color:var(--ink-faint);
    cursor:grab;
  }
  .drag-handle:active{ cursor:grabbing; }
  .chapter-row.dragging{ opacity:0.4; }
  .chapter-row.drag-over-top{ box-shadow: inset 0 2px 0 var(--navy); }
  .chapter-row.drag-over-bottom{ box-shadow: inset 0 -2px 0 var(--navy); }

  .confirm-btn{
    color:var(--danger);
    border-color:var(--rose-soft);
    background:var(--rose-soft);
  }

  .add-chapter-trigger{
    width:100%;
    padding:13px 16px;
    border:1px dashed var(--line);
    border-radius:var(--radius-m);
    background:transparent;
    color:var(--ink-soft);
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-top:10px;
  }
  .add-chapter-trigger:hover{ border-color:var(--ink-faint); color:var(--ink); }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--ink);
    color:#fff;
    font-size:13px;
    padding:10px 18px;
    border-radius:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  .loading-state{
    text-align:center;
    padding:80px 20px;
    color:var(--ink-faint);
    font-size:14px;
  }

  @media (max-width:520px){
    .app{ padding:24px 16px 60px; }
    .grid{ grid-template-columns:1fr 1fr; }
    .field-row{ flex-direction:column; gap:0; }
  }

  /* auth screen */
  .auth-wrap{
    max-width:380px;
    margin:60px auto 0;
  }
  .auth-wrap .brand{ justify-content:center; margin-bottom:28px; }
  .auth-tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .auth-tab{
    flex:1;
    text-align:center;
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    padding:9px 8px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .auth-tab.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  .auth-error{
    font-size:13px;
    color:var(--danger);
    background:var(--rose-soft);
    padding:9px 12px;
    border-radius:var(--radius-s);
    margin-bottom:14px;
    line-height:1.5;
  }
  .auth-hint{
    text-align:center;
    font-size:12.5px;
    color:var(--ink-faint);
    margin-top:14px;
  }
  .user-badge{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:13px;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .user-badge .user-email{
    max-width:160px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .header-right{
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
  }

  /* dashboard */
  .dashboard{
    margin-bottom:16px;
  }
  .stats-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
    flex-wrap:wrap;
  }
  .stats-row .total-books{
    font-size:13px;
    font-weight:500;
    color:var(--ink);
  }
  .stats-row .breakdown{
    display:flex;
    gap:8px;
    font-size:12px;
    color:var(--ink-soft);
  }
  .stats-row .breakdown span{
    display:flex;
    align-items:center;
    gap:3px;
  }
  .stats-row .checkin-line{
    margin-left:auto;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .stats-row .streak-text{
    font-size:12px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .stats-row .streak-text:hover{ color:var(--ink); }
  .checkin-btn{
    display:inline-flex;
    align-items:center;
    gap:4px;
    border:none;
    background:var(--moss);
    color:#fff;
    font-family:inherit;
    font-size:12px;
    font-weight:500;
    padding:5px 12px;
    border-radius:var(--radius-s);
    cursor:pointer;
    transition:opacity .15s ease;
  }
  .checkin-btn:hover{ opacity:0.9; }
  .checkin-btn.done{
    background:var(--moss-soft);
    color:var(--moss);
    cursor:default;
  }

  /* checkin mini */
  .checkin-mini{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .checkin-mini .streak-text{
    font-size:12px;
    color:var(--ink-faint);
    cursor:pointer;
  }
  .checkin-mini .streak-text:hover{ color:var(--ink); }

  /* checkin detail page */
  .checkin-detail-header{
    margin-bottom:24px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    padding:6px 0;
    margin-bottom:16px;
    font-family:inherit;
  }
  .back-link:hover{ color:var(--ink); }
  .checkin-stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
    gap:16px;
    margin-bottom:28px;
  }
  .checkin-stat-card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:18px 20px;
  }
  .checkin-stat-card .stat-label{
    font-size:12px;
    color:var(--ink-faint);
    font-weight:500;
    margin:0 0 8px;
  }
  .checkin-stat-card .stat-value{
    font-size:28px;
    font-weight:600;
    font-family:'Source Serif 4','Noto Serif SC',serif;
    margin:0;
    color:var(--ink);
  }
  .checkin-stat-card .stat-unit{
    font-size:14px;
    color:var(--ink-soft);
    margin-left:4px;
  }
  .checkin-calendar-section h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    font-weight:600;
    margin:0 0 14px;
  }
  .checkin-calendar{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:4px;
  }
  .checkin-calendar .weekday-label{
    font-size:11px;
    color:var(--ink-faint);
    text-align:center;
    margin-bottom:4px;
  }
  .checkin-day{
    aspect-ratio:1;
    border-radius:4px;
    background:var(--line-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    color:var(--ink-faint);
  }
  .checkin-day.filled{ background:var(--moss); color:#fff; }
  .checkin-day.today{ border:1.5px solid var(--ink-faint); box-sizing:border-box; }
  .checkin-day.empty{ background:transparent; }

  .section-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:32px 0 14px;
  }
  .section-label h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    font-weight:600;
    margin:0;
  }

  /* book detail */
  .detail-header{ margin-bottom:24px; }
  }
  @media (max-width:640px){
    .stats-row{ flex-direction:column; align-items:flex-start; }
    .stats-row .checkin-line{ margin-left:0; }
    .checkin-btn{ width:100%; justify-content:center; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="loading-state">正在打开书架…</div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
  var SUPABASE_URL = 'https://twblartdcnmenbzkkset.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3YmxhcnRkY25tZW5iemtrc2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDAyODYsImV4cCI6MjA5OTY3NjI4Nn0._diS8l-mSYCVbjwztpUG4ScqaB4U9Hr-eJ_w_edUFA8';
  var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var state = {
    books: [],
    chapters: [],
    checkins: [],          // array of 'YYYY-MM-DD' strings, unique
    view: 'library',        // 'library' | 'book' | 'checkin'
    selectedBookId: null,
    showAddBook: false,
    openChapterId: null,
    editingChapterId: null, // chapter currently in edit form
    showAddChapter: false,
    pendingDelete: null,    // { type:'book'|'chapter', id }
    loaded: false,
    libraryFilter: 'all',   // 'all' | 'want' | 'reading' | 'done'
    searchQuery: '',
    draftBookTitle: '',
    draftBookAuthor: '',
    draftBookStatus: 'want',
    draftBookProgress: 0,
    session: null,
    authMode: 'login',      // 'login' | 'register'
    authEmail: '',
    authError: '',
    authLoading: false
  };

  var STATUS_META = {
    want:    { label: '想读', chipClass: 'status-want' },
    reading: { label: '在读', chipClass: 'status-reading' },
    done:    { label: '读完', chipClass: 'status-done' }
  };

  var SPINE_COLORS = ['navy','moss','gold','rose','teal'];
  var draggedChapterId = null;
  function spineColorFor(id){
    var hash = 0;
    for (var i=0;i<id.length;i++){ hash = (hash*31 + id.charCodeAt(i)) >>> 0; }
    return SPINE_COLORS[hash % SPINE_COLORS.length];
  }

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  function getMotto(){
    return localStorage.getItem('bookshelf_motto') || '';
  }
  function setMotto(text){
    localStorage.setItem('bookshelf_motto', text);
  }
  function getMottoDisplay(){
    var m = getMotto();
    return m ? '<span class="motto-display" data-action="edit-motto">' + escapeHtml(m) + '</span>' : '<span class="motto-empty" data-action="edit-motto">添加座右铭</span>';
  }

  function escapeHtml(str){
    return (str || '').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  async function loadData(){
    var sessionRes = await supabaseClient.auth.getSession();
    state.session = sessionRes.data ? sessionRes.data.session : null;
    state.loaded = true;

    supabaseClient.auth.onAuthStateChange(function(event, session){
      state.session = session;
      if (event === 'SIGNED_IN'){
        loadUserData();
      } else if (event === 'SIGNED_OUT'){
        state.books = [];
        state.chapters = [];
        state.checkins = [];
        state.view = 'library';
        state.selectedBookId = null;
        render();
      }
    });

    if (state.session){
      showToast('加载中...');
      await loadUserData();
    } else {
      render();
    }
  }

  async function loadUserData(){
    try{
      var userId = state.session.user.id;
      var result = await supabaseClient
        .from('user_data')
        .select('data')
        .eq('user_id', userId)
        .maybeSingle();
      if (result.error) throw result.error;
      if (result.data && result.data.data){
        state.books = result.data.data.books || [];
        state.chapters = result.data.data.chapters || [];
        state.checkins = result.data.data.checkins || [];
      } else {
        state.books = [];
        state.chapters = [];
        state.checkins = [];
      }
    }catch(e){
      showToast('读取云端数据失败，请检查网络后重试');
    }
    render();
  }

  async function persist(){
    if (!state.session) return;
    try{
      var userId = state.session.user.id;
      var result = await supabaseClient
        .from('user_data')
        .upsert({
          user_id: userId,
          data: { books: state.books, chapters: state.chapters, checkins: state.checkins },
          updated_at: new Date().toISOString()
        });
      if (result.error) throw result.error;
    }catch(e){
      showToast('保存失败，请检查网络后重试');
    }
  }

  /* ---------- auth ---------- */

  function translateAuthError(msg){
    if (!msg) return '出错了，请重试';
    if (msg.indexOf('Invalid login credentials') !== -1) return '邮箱或密码不正确';
    if (msg.indexOf('User already registered') !== -1) return '该邮箱已注册，请直接登录';
    if (msg.indexOf('Email not confirmed') !== -1) return '请先前往邮箱完成验证后再登录';
    if (msg.indexOf('Password should be at least') !== -1) return '密码至少需要 6 位';
    if (msg.indexOf('Unable to validate email address') !== -1) return '邮箱格式不正确';
    return msg;
  }

  async function handleLogin(){
    var emailEl = document.getElementById('auth-email');
    var passEl = document.getElementById('auth-password');
    var email = emailEl ? emailEl.value.trim() : '';
    var password = passEl ? passEl.value : '';
    if (!email || !password){
      state.authError = '请填写邮箱和密码';
      render();
      return;
    }
    state.authEmail = email;
    state.authLoading = true;
    state.authError = '';
    render();
    var result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
    state.authLoading = false;
    if (result.error){
      state.authError = translateAuthError(result.error.message);
      render();
      return;
    }
    state.session = result.data.session;
    await loadUserData();
  }

  async function handleRegister(){
    var emailEl = document.getElementById('auth-email');
    var passEl = document.getElementById('auth-password');
    var email = emailEl ? emailEl.value.trim() : '';
    var password = passEl ? passEl.value : '';
    if (!email || !password){
      state.authError = '请填写邮箱和密码';
      render();
      return;
    }
    if (password.length < 6){
      state.authError = '密码至少需要 6 位';
      render();
      return;
    }
    state.authEmail = email;
    state.authLoading = true;
    state.authError = '';
    render();
    var result = await supabaseClient.auth.signUp({ email: email, password: password });
    state.authLoading = false;
    if (result.error){
      state.authError = translateAuthError(result.error.message);
      render();
      return;
    }
    if (result.data.session){
      state.session = result.data.session;
      await loadUserData();
    } else {
      state.authMode = 'login';
      state.authError = '';
      render();
      showToast('注册成功，请查收邮箱完成验证后登录');
    }
  }

  async function handleLogout(){
    await supabaseClient.auth.signOut();
    state.session = null;
    state.books = [];
    state.chapters = [];
    state.checkins = [];
    state.view = 'library';
    state.selectedBookId = null;
    render();
  }

  function getChaptersForBook(bookId){
    return state.chapters
      .filter(function(c){ return c.bookId === bookId; })
      .sort(function(a,b){
        var ao = (typeof a.order === 'number') ? a.order : (a.createdAt || 0);
        var bo = (typeof b.order === 'number') ? b.order : (b.createdAt || 0);
        return ao - bo;
      });
  }

  /* ---------- actions ---------- */

  function addBook(title, author, status, progress){
    var book = {
      id: uid(),
      title: title.trim(),
      author: author.trim(),
      status: status || 'want',
      progress: (status === 'reading') ? clampProgress(progress) : (status === 'done' ? 100 : 0),
      createdAt: Date.now()
    };
    state.books.unshift(book);
    state.showAddBook = false;
    state.draftBookTitle = '';
    state.draftBookAuthor = '';
    state.draftBookStatus = 'want';
    state.draftBookProgress = 0;
    persist();
    render();
    showToast('已添加《' + book.title + '》');
  }

  function clampProgress(v){
    v = parseInt(v, 10);
    if (isNaN(v)) v = 0;
    return Math.max(0, Math.min(100, v));
  }

  function setBookStatus(bookId, status){
    var book = state.books.find(function(b){ return b.id === bookId; });
    if (!book) return;
    book.status = status;
    if (status === 'done') book.progress = 100;
    if (status === 'want') book.progress = 0;
    if (status === 'reading' && (!book.progress || book.progress === 100)) book.progress = book.progress === 100 ? 100 : 0;
    persist();
    render();
  }

  function setBookProgress(bookId, progress){
    var book = state.books.find(function(b){ return b.id === bookId; });
    if (!book) return;
    book.progress = clampProgress(progress);
    if (book.progress >= 100){ book.progress = 100; book.status = 'done'; }
    persist();
    render();
  }

  function deleteBook(bookId){
    state.books = state.books.filter(function(b){ return b.id !== bookId; });
    state.chapters = state.chapters.filter(function(c){ return c.bookId !== bookId; });
    state.pendingDelete = null;
    state.view = 'library';
    state.selectedBookId = null;
    persist();
    render();
    showToast('已删除该书');
  }

  function addChapter(bookId, title, quote, content){
    var existing = getChaptersForBook(bookId);
    var maxOrder = existing.reduce(function(max, c){
      return Math.max(max, (typeof c.order === 'number') ? c.order : 0);
    }, -1);
    var chapter = {
      id: uid(),
      bookId: bookId,
      title: title.trim(),
      quote: (quote || '').trim(),
      content: content.trim(),
      order: maxOrder + 1,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    state.chapters.push(chapter);
    state.showAddChapter = false;
    state.openChapterId = chapter.id;
    persist();
    render();
    showToast('已添加章节');
  }

  function reorderChapters(bookId, draggedId, targetId, insertAfter){
    var ordered = getChaptersForBook(bookId);
    var draggedIdx = ordered.findIndex(function(c){ return c.id === draggedId; });
    if (draggedIdx === -1) return;
    var dragged = ordered.splice(draggedIdx, 1)[0];
    var targetIdx = ordered.findIndex(function(c){ return c.id === targetId; });
    if (targetIdx === -1){
      ordered.push(dragged);
    } else {
      ordered.splice(insertAfter ? targetIdx + 1 : targetIdx, 0, dragged);
    }
    ordered.forEach(function(c, idx){ c.order = idx; });
    persist();
    render();
  }

  function updateChapter(chapterId, title, quote, content){
    var ch = state.chapters.find(function(c){ return c.id === chapterId; });
    if (ch){
      ch.title = title.trim();
      ch.quote = (quote || '').trim();
      ch.content = content.trim();
      ch.updatedAt = Date.now();
    }
    state.editingChapterId = null;
    persist();
    render();
    showToast('已保存');
  }

  function deleteChapter(chapterId){
    state.chapters = state.chapters.filter(function(c){ return c.id !== chapterId; });
    state.pendingDelete = null;
    persist();
    render();
    showToast('已删除该章节');
  }

  /* ---------- check-in ---------- */

  function todayStr(){
    var d = new Date();
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function dateStrOffset(offsetDays){
    var d = new Date();
    d.setDate(d.getDate() + offsetDays);
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function isCheckedIn(dateStr){
    return state.checkins.indexOf(dateStr) !== -1;
  }

  function toggleTodayCheckin(){
    var today = todayStr();
    if (isCheckedIn(today)) return; // already checked in, no toggling off
    state.checkins.push(today);
    persist();
    render();
    showToast('打卡成功，继续加油！');
  }

  function getCurrentStreak(){
    var streak = 0;
    var offset = 0;
    // if today not checked in yet, start counting from yesterday
    if (!isCheckedIn(todayStr())){
      offset = -1;
    }
    while (isCheckedIn(dateStrOffset(offset))){
      streak++;
      offset--;
    }
    return streak;
  }

  function getCheckinCalendarDays(numDays){
    var days = [];
    for (var i = numDays - 1; i >= 0; i--){
      var ds = dateStrOffset(-i);
      days.push({ date: ds, filled: isCheckedIn(ds), isToday: (i === 0) });
    }
    return days;
  }


  /* ---------- rendering ---------- */

  function render(){
    var app = document.getElementById('app');
    if (!state.loaded){
      app.innerHTML = '<div class="loading-state">正在打开书架…</div>';
      return;
    }
    if (!state.session){
      app.innerHTML = renderAuthScreen();
      bindEvents();
      return;
    }
    if (state.view === 'book' && state.selectedBookId){
      app.innerHTML = renderHeader() + renderBookDetail();
    } else if (state.view === 'checkin'){
      app.innerHTML = renderHeader() + renderCheckinDetail();
    } else {
      app.innerHTML = renderHeader() + renderLibrary();
    }
    bindEvents();
  }

  function renderAuthScreen(){
    var mode = state.authMode;
    return ''
    + '<div class="auth-wrap">'
    +   '<div class="brand">'
    +     '<div class="brand-mark"></div>'
    +     '<div><h1 class="serif">书斋</h1><p>记录读过的每一本书，梳理每一章的收获</p></div>'
    +   '</div>'
    +   '<div class="panel">'
    +     '<div class="auth-tabs">'
    +       '<button class="auth-tab ' + (mode==='login'?'active':'') + '" data-action="switch-auth-mode" data-mode="login">登录</button>'
    +       '<button class="auth-tab ' + (mode==='register'?'active':'') + '" data-action="switch-auth-mode" data-mode="register">注册</button>'
    +     '</div>'
    + (state.authError ? '<div class="auth-error">' + escapeHtml(state.authError) + '</div>' : '')
    +     '<div class="field"><label>邮箱</label><input type="email" id="auth-email" placeholder="you@example.com" value="' + escapeHtml(state.authEmail) + '" autofocus></div>'
    +     '<div class="field"><label>密码</label><input type="password" id="auth-password" placeholder="至少 6 位" value=""></div>'
    +     '<button class="btn btn-primary btn-full" data-action="' + (mode==='login'?'submit-login':'submit-register') + '"' + (state.authLoading ? ' disabled' : '') + '>'
    +       (state.authLoading ? '请稍候…' : (mode==='login' ? '登录' : '注册'))
    +     '</button>'
    +   '</div>'
    +   '<p class="auth-hint">' + (mode==='login' ? '还没有账号？点上方"注册"创建一个。' : '数据只有你登录后能看到，请牢记密码。') + '</p>'
    + '</div>';
  }

  function renderHeader(){
    var userEmail = (state.session && state.session.user) ? state.session.user.email : '';
    return ''
    + '<div class="app-header">'
    +   '<div class="brand">'
    +     '<div class="brand-mark"></div>'
    +     '<h1 class="serif">书斋</h1>'
    +   '</div>'
    +   '<div class="header-actions">'
    +     '<span class="user-email-btn" data-action="toggle-user-menu">' + escapeHtml(userEmail) + '</span>'
    +     '<div class="user-dropdown" id="user-dropdown" style="display:none;">'
    +       '<button class="btn btn-ghost btn-sm" data-action="logout">退出登录</button>'
    +     '</div>'
    +   '</div>'
    + '</div>'
    + (state.view === 'library' && state.books.length > 0
      ? '<div class="search-box">'
        + '<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>'
        + '<input type="text" id="search-input" placeholder="搜索书名、作者或笔记内容" value="' + escapeHtml(state.searchQuery) + '">'
        + (state.searchQuery ? '<button class="search-clear" data-action="clear-search" aria-label="清除搜索"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>' : '')
        + '</div>'
      : '');
  }

  function renderLibrary(){
    var html = '';
    if (state.showAddBook){
      html += renderAddBookForm();
    }
    var query = (state.searchQuery || '').trim();
    if (query && !state.showAddBook){
      return html + renderSearchResults(query);
    }
    if (state.books.length === 0 && !state.showAddBook){
      html += ''
      + '<div class="empty">'
      +   '<h2 class="serif">书架空空如也</h2>'
      +   '<p>添加第一本正在读的书，开始记录你的阅读笔记。</p>'
      +   '<button class="btn btn-primary btn-sm" data-action="open-add-book"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>添加书本</button>'
      + '</div>';
      return html;
    }
    if (state.books.length > 0){
      var counts = { all: state.books.length, want: 0, reading: 0, done: 0 };
      state.books.forEach(function(b){ counts[b.status || 'want']++; });

      // 第一行：座右铭 + 打卡
      var streak = getCurrentStreak();
      var checkedToday = isCheckedIn(todayStr());
      html += '<div class="motto-row">'
        + '<span class="motto-left">' + getMottoDisplay() + '</span>'
        + '<div class="checkin-mini">'
        +   '<span class="streak-text" data-action="open-checkin-detail">' + streak + ' 天</span>'
        +   '<button class="checkin-btn ' + (checkedToday ? 'done' : '') + '" data-action="checkin-today"' + (checkedToday ? ' disabled' : '') + '>'
        +     (checkedToday ? '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>已打卡' : '打卡')
        +   '</button>'
        + '</div>'
        + '</div>';

      // 第二行：筛选标签 + 添加书本
      html += '<div class="shelf-actions">'
        + '<div class="filter-tabs">'
        + renderFilterTab('all', '全部', counts.all)
        + renderFilterTab('want', '想读', counts.want)
        + renderFilterTab('reading', '在读', counts.reading)
        + renderFilterTab('done', '读完', counts.done)
        + '</div>'
        + '<button class="btn btn-primary btn-sm" data-action="open-add-book"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>'
        + '</div>';

      var visibleBooks = state.books.filter(function(b){
        return state.libraryFilter === 'all' || (b.status || 'want') === state.libraryFilter;
      });

      if (visibleBooks.length === 0){
        html += '<div class="empty" style="padding:48px 20px;"><p style="margin:0;">这个分类下暂时没有书。</p></div>';
        return html;
      }

      html += '<div class="grid">';
      visibleBooks.forEach(function(b){
        var count = getChaptersForBook(b.id).length;
        var color = spineColorFor(b.id);
        var status = b.status || 'want';
        var meta = STATUS_META[status];

  function highlight(text, query){
    var escaped = escapeHtml(text);
    if (!query) return escaped;
    var escapedQuery = escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp('(' + escapedQuery + ')', 'ig'), '<mark>$1</mark>');
  }

  function snippetAround(text, query){
    var lower = text.toLowerCase();
    var idx = lower.indexOf(query.toLowerCase());
    if (idx === -1) return text.slice(0, 80);
    var start = Math.max(0, idx - 30);
    var end = Math.min(text.length, idx + query.length + 50);
    return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
  }

  function renderSearchResults(query){
    var q = query.toLowerCase();
    var hits = [];

    state.books.forEach(function(book){
      var bookMatch = book.title.toLowerCase().indexOf(q) !== -1 || (book.author || '').toLowerCase().indexOf(q) !== -1;
      var chapters = getChaptersForBook(book.id);
      var chapterHitFound = false;

      chapters.forEach(function(ch){
        var inTitle = ch.title.toLowerCase().indexOf(q) !== -1;
        var inQuote = (ch.quote || '').toLowerCase().indexOf(q) !== -1;
        var inContent = (ch.content || '').toLowerCase().indexOf(q) !== -1;
        if (inTitle || inQuote || inContent){
          chapterHitFound = true;
          var snippetSource = inQuote ? ch.quote : (inContent ? ch.content : ch.title);
          hits.push({
            bookId: book.id,
            chapterId: ch.id,
            bookTitle: book.title,
            title: ch.title,
            snippet: snippetAround(snippetSource, query)
          });
        }
      });

      if (bookMatch && !chapterHitFound){
        hits.push({
          bookId: book.id,
          chapterId: null,
          bookTitle: null,
          title: book.title,
          snippet: book.author || ''
        });
      }
    });

    var html = '<div class="shelf-label"><span>找到 ' + hits.length + ' 条结果</span></div>';
    if (hits.length === 0){
      html += '<div class="empty" style="padding:48px 20px;"><p style="margin:0;">没有找到匹配的书本或笔记，换个关键词试试。</p></div>';
      return html;
    }
    html += '<div class="search-results">';
    hits.forEach(function(hit){
      html += '<div class="search-hit" data-action="open-search-hit" data-book-id="' + hit.bookId + '"' + (hit.chapterId ? ' data-chapter-id="' + hit.chapterId + '"' : '') + '>'
        + (hit.bookTitle ? '<p class="hit-book">' + escapeHtml(hit.bookTitle) + '</p>' : '')
        + '<h4>' + highlight(hit.title, query) + '</h4>'
        + (hit.snippet ? '<p>' + highlight(hit.snippet, query) + '</p>' : '')
        + '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ---------- events ---------- */

  function bindEvents(){
    var app = document.getElementById('app');
    app.onclick = function(e){
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      var id = target.getAttribute('data-id');

      switch(action){
        case 'edit-motto':
          var currentMotto = getMotto();
          var newMotto = prompt('输入你的座右铭（限20字以内）：', currentMotto);
          if (newMotto !== null){
            newMotto = newMotto.trim().slice(0, 20);
            setMotto(newMotto);
            render();
          }
          break;
        case 'open-add-book':
          state.showAddBook = true;
          state.draftBookTitle = '';
          state.draftBookAuthor = '';
          state.draftBookStatus = 'want';
          state.draftBookProgress = 0;
          render();
          setTimeout(function(){ var el = document.getElementById('new-book-title'); if (el) el.focus(); }, 0);
          break;
        case 'cancel-add-book':
          state.showAddBook = false;
          render();
          break;
        case 'submit-add-book':
          submitAddBook();
          break;
        case 'set-draft-status':
          syncDraftBookFromDom();
          state.draftBookStatus = target.getAttribute('data-status');
          render();
          setTimeout(function(){ var el = document.getElementById('new-book-title'); if (el) el.focus(); }, 0);
          break;
        case 'filter-library':
          state.libraryFilter = target.getAttribute('data-filter');
          render();
          break;
        case 'set-book-status':
          setBookStatus(id, target.getAttribute('data-status'));
          break;
        case 'open-book':
          state.view = 'book';
          state.selectedBookId = id;
          state.openChapterId = null;
          state.editingChapterId = null;
          state.showAddChapter = false;
          state.pendingDelete = null;
          render();
          window.scrollTo(0,0);
          break;
        case 'back-to-library':
          state.view = 'library';
          state.selectedBookId = null;
          state.pendingDelete = null;
          render();
          break;
        case 'delete-book':
          if (state.pendingDelete && state.pendingDelete.type === 'book' && state.pendingDelete.id === id){
            deleteBook(id);
          } else {
            state.pendingDelete = {type:'book', id:id};
            render();
          }
          break;
        case 'open-add-chapter':
          state.showAddChapter = true;
          render();
          setTimeout(function(){ var el = document.getElementById('new-chapter-title'); if (el) el.focus(); }, 0);
          break;
        case 'cancel-add-chapter':
          state.showAddChapter = false;
          render();
          break;
        case 'submit-add-chapter':
          submitAddChapter();
          break;
        case 'toggle-chapter':
          if (state.editingChapterId === id) break;
          if (e.target.closest('.drag-handle')) break;
          state.openChapterId = (state.openChapterId === id) ? null : id;
          render();
          break;
        case 'edit-chapter':
          state.openChapterId = id;
          state.editingChapterId = id;
          render();
          setTimeout(function(){ var el = document.getElementById('edit-content-' + id); if (el) el.focus(); }, 0);
          break;
        case 'cancel-edit-chapter':
          state.editingChapterId = null;
          render();
          break;
        case 'save-chapter':
          submitEditChapter(id);
          break;
        case 'delete-chapter':
          if (state.pendingDelete && state.pendingDelete.type === 'chapter' && state.pendingDelete.id === id){
            deleteChapter(id);
          } else {
            state.pendingDelete = {type:'chapter', id:id};
            render();
          }
          break;
        case 'clear-search':
          state.searchQuery = '';
          render();
          break;
        case 'open-search-hit':
          state.view = 'book';
          state.selectedBookId = target.getAttribute('data-book-id');
          state.openChapterId = target.getAttribute('data-chapter-id') || null;
          state.editingChapterId = null;
          state.showAddChapter = false;
          state.pendingDelete = null;
          state.searchQuery = '';
          render();
          window.scrollTo(0,0);
          break;
        case 'export-all':
          exportMarkdown();
          break;
        case 'export-book':
          exportMarkdown(id);
          break;
        case 'switch-auth-mode':
          state.authMode = target.getAttribute('data-mode');
          state.authError = '';
          render();
          setTimeout(function(){ var el = document.getElementById('auth-email'); if (el) el.focus(); }, 0);
          break;
        case 'open-checkin-detail':
          state.view = 'checkin';
          render();
          window.scrollTo(0,0);
          break;
        case 'checkin-today':
          toggleTodayCheckin();
          break;
        case 'submit-login':
          handleLogin();
          break;
        case 'submit-register':
          handleRegister();
          break;
        case 'toggle-user-menu':
          var dropdown = document.getElementById('user-dropdown');
          if (dropdown) dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
          break;
        case 'logout':
          handleLogout();
          break;
      }
    };

    // 点击其他地方关闭下拉菜单
    document.addEventListener('click', function(e){
      if (!e.target.closest('.header-actions')){
        var dropdown = document.getElementById('user-dropdown');
        if (dropdown) dropdown.style.display = 'none';
      }
    });

    // Enter-to-submit on auth password field
    var authPassword = document.getElementById('auth-password');
    if (authPassword){
      authPassword.addEventListener('keydown', function(e){
        if (e.key === 'Enter'){
          if (state.authMode === 'login') handleLogin(); else handleRegister();
        }
      });
    }

    // Enter-to-submit on single-line title inputs
    var newBookTitle = document.getElementById('new-book-title');
    if (newBookTitle){
      newBookTitle.addEventListener('keydown', function(e){ if (e.key === 'Enter') submitAddBook(); });
    }
    var newChapterTitle = document.getElementById('new-chapter-title');
    if (newChapterTitle){
      newChapterTitle.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); document.getElementById('new-chapter-content').focus(); } });
    }

    // reading-progress slider: live label update + persist on release
    var slider = document.getElementById('progress-slider');
    if (slider){
      slider.addEventListener('input', function(){
        var label = document.getElementById('progress-value-label');
        if (label) label.textContent = slider.value + '%';
      });
      slider.addEventListener('change', function(){
        setBookProgress(slider.getAttribute('data-id'), slider.value);
      });
    }

    // search input: re-render results while preserving cursor/focus
    // (ignore input events fired during IME composition so Chinese/Japanese/Korean typing isn't interrupted)
    var searchInput = document.getElementById('search-input');
    if (searchInput){
      var isComposing = false;
      function handleSearchInput(){
        var cursor = searchInput.selectionStart;
        state.searchQuery = searchInput.value;
        render();
        var el = document.getElementById('search-input');
        if (el){ el.focus(); el.setSelectionRange(cursor, cursor); }
      }
      searchInput.addEventListener('compositionstart', function(){ isComposing = true; });
      searchInput.addEventListener('compositionend', function(){
        isComposing = false;
        handleSearchInput();
      });
      searchInput.addEventListener('input', function(e){
        if (isComposing || e.isComposing) return;
        handleSearchInput();
      });
    }

    // chapter drag-to-reorder
    app.ondragstart = function(e){
      var handle = e.target.closest('.chapter-head');
      if (!handle){ e.preventDefault(); return; }
      var row = handle.closest('.chapter-row');
      if (!row) return;
      draggedChapterId = row.getAttribute('data-chapter-id');
      e.dataTransfer.effectAllowed = 'move';
      try{ e.dataTransfer.setData('text/plain', draggedChapterId); }catch(err){}
      setTimeout(function(){ row.classList.add('dragging'); }, 0);
    };
    app.ondragover = function(e){
      if (!draggedChapterId) return;
      var row = e.target.closest('.chapter-row');
      if (!row) return;
      e.preventDefault();
      clearDragOverClasses();
      var rect = row.getBoundingClientRect();
      var isTopHalf = (e.clientY - rect.top) < rect.height / 2;
      row.classList.add(isTopHalf ? 'drag-over-top' : 'drag-over-bottom');
    };
    app.ondrop = function(e){
      if (!draggedChapterId) return;
      var row = e.target.closest('.chapter-row');
      clearDragOverClasses();
      if (row){
        e.preventDefault();
        var targetId = row.getAttribute('data-chapter-id');
        var rect = row.getBoundingClientRect();
        var insertAfter = (e.clientY - rect.top) >= rect.height / 2;
        if (targetId !== draggedChapterId){
          reorderChapters(state.selectedBookId, draggedChapterId, targetId, insertAfter);
        }
      }
      draggedChapterId = null;
    };
    app.ondragend = function(){
      draggedChapterId = null;
      clearDragOverClasses();
      var draggingEl = document.querySelector('.chapter-row.dragging');
      if (draggingEl) draggingEl.classList.remove('dragging');
    };
  }

  function clearDragOverClasses(){
    var els = document.querySelectorAll('.chapter-row.drag-over-top, .chapter-row.drag-over-bottom');
    for (var i=0;i<els.length;i++){ els[i].classList.remove('drag-over-top','drag-over-bottom'); }
  }

  function buildMarkdown(bookIdFilter){
    var books = bookIdFilter ? state.books.filter(function(b){ return b.id === bookIdFilter; }) : state.books;
    var lines = ['# 书斋读书笔记', ''];
    books.forEach(function(b){
      var meta = STATUS_META[b.status || 'want'];
      lines.push('## ' + b.title + (b.author ? '（' + b.author + '）' : ''));
      lines.push('');
      lines.push('- 状态：' + meta.label + (b.status === 'reading' ? '，进度 ' + clampProgress(b.progress || 0) + '%' : ''));
      lines.push('');
      var chapters = getChaptersForBook(b.id);
      if (chapters.length === 0){
        lines.push('_暂无章节笔记_');
        lines.push('');
      } else {
        chapters.forEach(function(ch, idx){
          lines.push('### ' + (idx + 1) + '. ' + ch.title);
          if (ch.quote){
            lines.push('> ' + ch.quote);
            lines.push('');
          }
          lines.push(ch.content || '_暂无总结_');
          lines.push('');
        });
      }
    });
    return lines.join('\n');
  }

  function exportMarkdown(bookIdFilter){
    if (state.books.length === 0){
      showToast('还没有可导出的内容');
      return;
    }
    var md = buildMarkdown(bookIdFilter);
    var targetBook = bookIdFilter ? state.books.find(function(b){ return b.id === bookIdFilter; }) : null;
    var filename = targetBook ? (targetBook.title + '-读书笔记.md') : '书斋读书笔记.md';
    try{
      var blob = new Blob([md], {type: 'text/markdown;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      showToast('已导出 Markdown 文件');
    }catch(e){
      showToast('导出失败，请重试');
    }
  }

  function syncDraftBookFromDom(){
    var titleEl = document.getElementById('new-book-title');
    var authorEl = document.getElementById('new-book-author');
    var progressEl = document.getElementById('new-book-progress');
    if (titleEl) state.draftBookTitle = titleEl.value;
    if (authorEl) state.draftBookAuthor = authorEl.value;
    if (progressEl) state.draftBookProgress = clampProgress(progressEl.value);
  }

  function submitAddBook(){
    var titleEl = document.getElementById('new-book-title');
    var authorEl = document.getElementById('new-book-author');
    var progressEl = document.getElementById('new-book-progress');
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写书名');
      if (titleEl) titleEl.focus();
      return;
    }
    addBook(title, authorEl ? authorEl.value : '', state.draftBookStatus || 'want', progressEl ? progressEl.value : state.draftBookProgress);
  }

  function submitAddChapter(){
    var titleEl = document.getElementById('new-chapter-title');
    var quoteEl = document.getElementById('new-chapter-quote');
    var contentEl = document.getElementById('new-chapter-content');
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写章节标题');
      if (titleEl) titleEl.focus();
      return;
    }
    addChapter(state.selectedBookId, title, quoteEl ? quoteEl.value : '', contentEl ? contentEl.value : '');
  }

  function submitEditChapter(chapterId){
    var titleEl = document.getElementById('edit-title-' + chapterId);
    var quoteEl = document.getElementById('edit-quote-' + chapterId);
    var contentEl = document.getElementById('edit-content-' + chapterId);
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写章节标题');
      if (titleEl) titleEl.focus();
      return;
    }
    updateChapter(chapterId, title, quoteEl ? quoteEl.value : '', contentEl ? contentEl.value : '');
  }

  loadData();
})();
</script>
</body>
</html>
