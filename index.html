<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书斋 - 读书笔记</title>
<style>
  :root{
    --bg:#F2F2ED;
    --surface:#FFFFFF;
    --ink:#22252B;
    --ink-soft:#6B6F76;
    --ink-faint:#9A9D9F;
    --line:#DFDED4;
    --line-soft:#EAE9E0;
    --navy:#2B3A55;
    --navy-soft:#E7EAF0;
    --moss:#4E6B4E;
    --moss-soft:#E7EDE5;
    --gold:#B8862F;
    --gold-soft:#F3E9D6;
    --rose:#8B4049;
    --rose-soft:#F1E2E1;
    --teal:#33636A;
    --teal-soft:#E1EBEA;
    --danger:#A13F3F;
    --radius-s:6px;
    --radius-m:10px;
    --radius-l:14px;
    --shadow: 0 1px 2px rgba(34,37,43,0.04), 0 2px 8px rgba(34,37,43,0.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:920px;
    margin:0 auto;
    padding:40px 24px 80px;
  }
  .serif{ font-family:'Source Serif 4','Noto Serif SC',Georgia,serif; }

  /* 登录界面 */
  .login-screen {
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
  }
  .login-box{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-l);
    padding:40px;
    max-width:380px;
    width:100%;
    text-align:center;
  }
  .login-box h1{
    font-size:28px;
    font-weight:600;
    margin:0 0 8px;
    font-family:'Source Serif 4','Noto Serif SC',serif;
  }
  .login-box p{
    font-size:14px;
    color:var(--ink-soft);
    margin:0 0 24px;
  }
  .login-box input{
    width:100%;
    padding:14px 16px;
    border:1px solid var(--line);
    border-radius:var(--radius-s);
    font-size:16px;
    font-family:inherit;
    text-align:center;
    margin-bottom:12px;
  }
  .login-box input:focus{
    outline:none;
    border-color:var(--navy);
  }
  .login-box .error{
    color:var(--danger);
    font-size:13px;
    margin-bottom:12px;
    display:none;
  }
  .login-box .hint{
    color:var(--ink-faint);
    font-size:12px;
    margin-top:20px;
  }
  .login-box .btn-primary{
    width:100%;
    padding:14px;
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:var(--radius-s);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .login-box .btn-primary:hover{
    background:#1f2b40;
  }

  /* header */
  .app-header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:36px;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-mark{
    width:34px;height:34px;flex:none;
    border-radius:4px;
    background:var(--navy);
    position:relative;
  }
  .brand-mark::before,.brand-mark::after{
    content:"";
    position:absolute;
    top:6px;bottom:6px;
    width:2px;
    background:rgba(255,255,255,0.55);
  }
  .brand-mark::before{ left:11px; }
  .brand-mark::after{ left:17px; }
  .brand h1{
    font-size:22px;
    font-weight:600;
    margin:0;
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:2px 0 0;
    font-size:13px;
    color:var(--ink-soft);
  }
  .btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    padding:9px 16px;
    border-radius:var(--radius-s);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .btn:hover{ border-color:var(--ink-faint); background:var(--line-soft); }
  .btn-primary{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  .btn-primary:hover{ background:#1f2b40; border-color:#1f2b40; }
  .btn-ghost{
    border-color:transparent;
    background:transparent;
    padding:9px 10px;
  }
  .btn-ghost:hover{ background:var(--line-soft); }
  .btn-danger{ color:var(--danger); }
  .btn-sm{ padding:6px 12px; font-size:13px; }
  .btn-full{ width:100%; justify-content:center; }
  .icon{ width:16px; height:16px; flex:none; }

  /* library grid */
  .shelf-label{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom:14px;
  }
  .shelf-label span{ font-size:13px; color:var(--ink-faint); }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:16px;
  }
  .book-card{
    position:relative;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:18px 18px 16px 20px;
    cursor:pointer;
    overflow:hidden;
    transition:border-color .15s ease, transform .1s ease;
  }
  .book-card:hover{ border-color:var(--ink-faint); }
  .book-card:active{ transform:scale(0.995); }
  .spine{
    position:absolute; left:0; top:0; bottom:0; width:5px;
  }
  .book-card h3{
    font-size:17px;
    font-weight:600;
    margin:0 0 4px;
    line-height:1.35;
    padding-right:4px;
  }
  .book-card .author{
    font-size:13px;
    color:var(--ink-soft);
    font-style:italic;
    margin:0 0 14px;
    font-family:'Source Serif 4','Noto Serif SC',serif;
  }
  .book-meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:12px;
    color:var(--ink-faint);
  }
  .chip{
    font-size:11px;
    padding:3px 8px;
    border-radius:20px;
    background:var(--line-soft);
    color:var(--ink-soft);
  }
  .status-chip{
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
    white-space:nowrap;
    border:none;
    font-family:inherit;
    cursor:pointer;
  }
  .status-want{ background:var(--gold-soft); color:var(--gold); }
  .status-reading{ background:var(--navy-soft); color:var(--navy); }
  .status-done{ background:var(--moss-soft); color:var(--moss); }

  .progress-track{
    width:100%;
    height:4px;
    border-radius:4px;
    background:var(--line-soft);
    overflow:hidden;
    margin-top:10px;
  }
  .progress-fill{
    height:100%;
    background:var(--navy);
    border-radius:4px;
  }

  /* filter tabs */
  .filter-tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
  }
  .filter-tab{
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    padding:7px 13px;
    border-radius:20px;
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .filter-tab:hover{ border-color:var(--ink-faint); }
  .filter-tab.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }

  /* status selector */
  .status-selector{ display:flex; gap:8px; }
  .status-option{
    flex:1;
    text-align:center;
    font-family:inherit;
    font-size:13px;
    font-weight:500;
    padding:9px 8px;
    border-radius:var(--radius-s);
    border:1px solid var(--line);
    background:var(--surface);
    color:var(--ink-soft);
    cursor:pointer;
  }
  .status-option:hover{ border-color:var(--ink-faint); }
  .status-option.active{
    background:var(--navy-soft);
    border-color:var(--navy);
    color:var(--navy);
  }

  /* progress editor */
  .progress-editor{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
  }
  .progress-editor input[type="range"]{ flex:1; }
  .progress-editor .progress-value{
    font-size:13px;
    font-weight:600;
    color:var(--navy);
    min-width:38px;
    text-align:right;
  }
  .status-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
  }

  /* quote excerpt */
  .chapter-quote{
    border-left:3px solid var(--gold);
    background:var(--gold-soft);
    padding:10px 14px;
    border-radius:0 var(--radius-s) var(--radius-s) 0;
    font-family:'Source Serif 4','Noto Serif SC',serif;
    font-style:italic;
    font-size:14px;
    line-height:1.65;
    color:#5C4419;
    margin:0 0 12px;
    white-space:pre-wrap;
  }

  /* search */
  .search-box{
    position:relative;
    margin-bottom:18px;
  }
  .search-box input{
    width:100%;
    font-family:inherit;
    font-size:14px;
    padding:10px 14px 10px 38px;
    border:1px solid var(--line);
    border-radius:var(--radius-s);
    background:var(--surface);
    color:var(--ink);
  }
  .search-box input:focus{ outline:none; border-color:var(--navy); }
  .search-box .search-icon{
    position:absolute;
    left:12px; top:50%;
    transform:translateY(-50%);
    width:16px; height:16px;
    color:var(--ink-faint);
    pointer-events:none;
  }
  .search-box .search-clear{
    position:absolute;
    right:10px; top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:var(--ink-faint);
    cursor:pointer;
    padding:4px;
    display:flex;
  }
  .search-results{ display:flex; flex-direction:column; gap:8px; }
  .search-hit{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:14px 16px;
    cursor:pointer;
  }
  .search-hit:hover{ border-color:var(--ink-faint); }
  .search-hit .hit-book{
    font-size:12px;
    color:var(--ink-faint);
    margin:0 0 3px;
  }
  .search-hit h4{
    font-size:15px;
    font-weight:600;
    margin:0 0 4px;
  }
  .search-hit p{
    font-size:13px;
    color:var(--ink-soft);
    margin:0;
    line-height:1.55;
  }
  .search-hit mark{
    background:var(--gold-soft);
    color:#5C4419;
    padding:0 2px;
    border-radius:2px;
  }

  /* empty state */
  .empty{
    text-align:center;
    padding:72px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius-l);
  }
  .empty h2{ font-size:18px; font-weight:600; margin:0 0 6px; }
  .empty p{ font-size:14px; color:var(--ink-soft); margin:0 0 20px; }

  /* forms / panels */
  .panel{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    padding:20px;
    margin-bottom:20px;
  }
  .panel h3{
    font-size:15px;
    font-weight:600;
    margin:0 0 14px;
  }
  .field{ margin-bottom:12px; }
  .field label{
    display:block;
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-weight:500;
  }
  .field input, .field textarea{
    width:100%;
    font-family:inherit;
    font-size:14px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:var(--radius-s);
    background:#FDFDFB;
    color:var(--ink);
    resize:vertical;
  }
  .field textarea{ min-height:160px; line-height:1.6; }
  .field input:focus, .field textarea:focus{
    outline:none;
    border-color:var(--navy);
    background:#fff;
  }
  .field-row{ display:flex; gap:12px; }
  .field-row .field{ flex:1; }
  .panel-actions{
    display:flex;
    gap:8px;
    justify-content:flex-end;
    margin-top:16px;
  }

  /* book detail */
  .detail-header{ margin-bottom:24px; }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:13px;
    color:var(--ink-soft);
    background:none;
    border:none;
    cursor:pointer;
    padding:6px 0;
    margin-bottom:16px;
    font-family:inherit;
  }
  .back-link:hover{ color:var(--ink); }
  .detail-title-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .detail-title-row h2{
    font-size:26px;
    font-weight:600;
    margin:0 0 4px;
  }
  .detail-title-row .author{
    font-size:14px;
    font-style:italic;
    color:var(--ink-soft);
    font-family:'Source Serif 4','Noto Serif SC',serif;
    margin:0;
  }
  .detail-actions{ display:flex; gap:8px; flex:none; }

  .section-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:32px 0 14px;
  }
  .section-label h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    font-weight:600;
    margin:0;
  }

  .chapter-list{ display:flex; flex-direction:column; gap:8px; }
  .chapter-row{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    overflow:hidden;
  }
  .chapter-head{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    cursor:pointer;
  }
  .chapter-num{
    flex:none;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--navy-soft);
    color:var(--navy);
    font-size:12px;
    font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .chapter-head-text{ flex:1; min-width:0; }
  .chapter-head-text h4{
    font-size:15px;
    font-weight:600;
    margin:0 0 2px;
  }
  .chapter-head-text p{
    font-size:12.5px;
    color:var(--ink-faint);
    margin:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chevron{
    flex:none;
    width:16px;height:16px;
    color:var(--ink-faint);
    transition:transform .15s ease;
  }
  .chapter-row.open .chevron{ transform:rotate(180deg); }
  .chapter-body{
    display:none;
    padding:0 16px 16px 54px;
    border-top:1px solid var(--line-soft);
  }
  .chapter-row.open .chapter-body{ display:block; padding-top:12px;}
  .chapter-content{
    font-size:14.5px;
    line-height:1.75;
    color:var(--ink);
    white-space:pre-wrap;
    font-family:'Source Serif 4','Noto Serif SC',serif;
    margin:0 0 12px;
  }
  .chapter-content.empty-note{
    color:var(--ink-faint);
    font-style:italic;
    font-family:'Inter','Noto Sans SC',sans-serif;
  }
  .chapter-body-actions{ display:flex; gap:8px; }

  .drag-handle{
    flex:none;
    width:16px; height:16px;
    color:var(--ink-faint);
    cursor:grab;
  }
  .drag-handle:active{ cursor:grabbing; }
  .chapter-row.dragging{ opacity:0.4; }
  .chapter-row.drag-over-top{ box-shadow: inset 0 2px 0 var(--navy); }
  .chapter-row.drag-over-bottom{ box-shadow: inset 0 -2px 0 var(--navy); }

  .confirm-btn{
    color:var(--danger);
    border-color:var(--rose-soft);
    background:var(--rose-soft);
  }

  .add-chapter-trigger{
    width:100%;
    padding:13px 16px;
    border:1px dashed var(--line);
    border-radius:var(--radius-m);
    background:transparent;
    color:var(--ink-soft);
    font-family:inherit;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    margin-top:10px;
  }
  .add-chapter-trigger:hover{ border-color:var(--ink-faint); color:var(--ink); }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(0);
    background:var(--ink);
    color:#fff;
    font-size:13px;
    padding:10px 18px;
    border-radius:20px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(-6px); }

  .loading-state{
    text-align:center;
    padding:80px 20px;
    color:var(--ink-faint);
    font-size:14px;
  }

  /* backup section in header */
  .header-actions{
    display:flex;
    gap:8px;
    align-items:center;
  }

  /* 阅读统计 */
  .stats-bar{
    display:flex;
    gap:24px;
    margin-bottom:24px;
    padding:16px 20px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
  }
  .stat-item{
    text-align:center;
    flex:1;
  }
  .stat-num{
    font-size:28px;
    font-weight:700;
    color:var(--navy);
    font-family:'Source Serif 4','Noto Serif SC',serif;
  }
  .stat-label{
    font-size:12px;
    color:var(--ink-faint);
    margin-top:2px;
  }
  .stat-item.highlight .stat-num{ color:var(--gold); }

  /* 打卡按钮 */
  .checkin-bar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    padding:16px;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius-m);
    margin-bottom:16px;
  }
  .checkin-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 24px;
    background:var(--navy);
    color:#fff;
    border:none;
    border-radius:var(--radius-s);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
    transition:background .15s;
  }
  .checkin-btn:hover{ background:#1f2b40; }
  .checkin-btn.checked{
    background:var(--moss);
    cursor:default;
  }
  .checkin-btn.checked:hover{ background:var(--moss); }
  .checkin-streak{
    font-size:13px;
    color:var(--ink-soft);
  }
  .checkin-streak strong{
    color:var(--gold);
    font-size:16px;
  }

  /* 阅读热力图 */
  .heatmap-section{
    margin-bottom:24px;
  }
  .heatmap-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:12px;
  }
  .heatmap-header h3{
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-faint);
    font-weight:600;
    margin:0;
  }
  .heatmap-streak{
    font-size:12px;
    color:var(--ink-soft);
  }
  .heatmap-streak strong{
    color:var(--gold);
    font-size:14px;
  }
  .heatmap-grid{
    display:flex;
    gap:3px;
    overflow-x:auto;
    padding-bottom:8px;
  }
  .heatmap-week{
    display:flex;
    flex-direction:column;
    gap:3px;
  }
  .heatmap-day{
    width:14px;
    height:14px;
    border-radius:3px;
    background:var(--line-soft);
    cursor:default;
  }
  .heatmap-day.level-1{ background:#c6e48b; }
  .heatmap-day.level-2{ background:#7bc96f; }
  .heatmap-day.level-3{ background:#239a3b; }
  .heatmap-day.level-4{ background:#196127; }
  .heatmap-labels{
    display:flex;
    gap:3px;
    margin-top:6px;
  }
  .heatmap-label{
    font-size:10px;
    color:var(--ink-faint);
    width:calc(14px * 7 + 3px * 6);
  }
  .heatmap-months{
    display:flex;
    gap:3px;
    margin-bottom:4px;
    font-size:10px;
    color:var(--ink-faint);
  }
  .heatmap-months span{
    padding-left:2px;
  }
  .heatmap-legend{
    display:flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    color:var(--ink-soft);
  }
  .heatmap-legend span{
    width:14px;
    height:14px;
    border-radius:3px;
    background:var(--line-soft);
  }
  .heatmap-legend span.active{ background:var(--moss); }
  .heatmap-bar{
    display:flex;
    gap:3px;
    margin-top:10px;
  }
  .heatmap-bar-day{
    flex:1;
    height:20px;
    border-radius:4px;
    background:var(--line-soft);
  }
  .heatmap-bar-day.has{ background:var(--moss); }
  .heatmap-bar-day.today{ border:2px solid var(--navy); }
  .heatmap-bar-labels{

<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function(){
  var STORAGE_KEY = 'reading-app-library';
  var PASSWORD_KEY = 'reading-app-password';

  // Supabase 配置
  var SUPABASE_URL = 'https://twblartdcnmenbzkkset.supabase.co';
  var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3YmxhcnRkY25tZW5iemtrc2V0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTEwMzE1NjAsImV4cCI6MjA2NjYwNzU2MH0.5dpDv-0xSb1pzmmrtIJA_1Jeshnev';

  var state = {
    books: [],
    chapters: [],
    view: 'library',
    selectedBookId: null,
    showAddBook: false,
    openChapterId: null,
    editingChapterId: null,
    showAddChapter: false,
    pendingDelete: null,
    loaded: false,
    libraryFilter: 'all',
    searchQuery: '',
    draftBookTitle: '',
    draftBookAuthor: '',
    draftBookStatus: 'want',
    draftBookProgress: 0,
    reviewChapterId: null,
    quoteWallCollapsed: false,
    statsCollapsed: false,
    reviewCollapsed: false,
    heatmapCollapsed: false,
    checkinDates: []  // 存储打卡日期 ['2024-01-15', ...]
  };

  var STATUS_META = {
    want:    { label: '想读', chipClass: 'status-want' },
    reading: { label: '在读', chipClass: 'status-reading' },
    done:    { label: '读完', chipClass: 'status-done' }
  };

  var SPINE_COLORS = ['navy','moss','gold','rose','teal'];
  var draggedChapterId = null;
  function spineColorFor(id){
    var hash = 0;
    for (var i=0;i<id.length;i++){ hash = (hash*31 + id.charCodeAt(i)) >>> 0; }
    return SPINE_COLORS[hash % SPINE_COLORS.length];
  }

  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
  }

  function escapeHtml(str){
    return (str || '').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function showToast(msg){
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function(){ t.classList.remove('show'); }, 1800);
  }

  // Gist 代理服务器配置
  var GIST_API = 'http://localhost:8787';
  var GITHUB_TOKEN = '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';
  var GIST_ID = 'b136546e5931022e394b26b1ae53092d'; // 首次会创建

  // Gist 保存
  async function saveToCloud(data){
    try {
      var payload = {
        description: '书斋读书笔记备份',
        files: {
          'reading-notes.json': {
            content: JSON.stringify(data, null, 2)
          }
        }
      };

      var url = GIST_ID
        ? GIST_API + '/' + GIST_ID
        : GIST_API;

      var method = GIST_ID ? 'PATCH' : 'POST';

      var response = await fetch(url, {
        method: method,
        headers: {
          'Authorization': 'Bearer ' + GITHUB_TOKEN,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      if (response.ok && method === 'POST') {
        var result = await response.json();
        GIST_ID = result.id;
        localStorage.setItem('gist_id', GIST_ID);
      }
      return true;
    } catch(e) {
      console.log('Cloud save failed:', e);
      return false;
    }
  }

  // Gist 加载
  async function loadFromCloud(){
    try {
      var storedGistId = localStorage.getItem('gist_id');
      if (!storedGistId) return null;

      var response = await fetch(GIST_API + '/' + storedGistId, {
        headers: {
          'Authorization': 'Bearer ' + GITHUB_TOKEN
        }
      });

      if (!response.ok) return null;

      var result = await response.json();
      GIST_ID = storedGistId;

      if (result.files && result.files['reading-notes.json']) {
        return JSON.parse(result.files['reading-notes.json'].content);
      }
    } catch(e) {
      console.log('Cloud load failed:', e);
    }
    return null;
  }

  async function loadData(){
    try{
      // 先尝试从云端加载
      var cloudData = await loadFromCloud();
      if (cloudData) {
        state.books = cloudData.books || [];
        state.chapters = cloudData.chapters || [];
        state.checkinDates = cloudData.checkinDates || [];
        // 同时保存到本地作为备份
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          books: state.books,
          chapters: state.chapters,
          checkinDates: state.checkinDates
        }));
      } else {
        // 云端没有，从本地加载
        var stored = localStorage.getItem(STORAGE_KEY);
        if (stored){
          var parsed = JSON.parse(stored);
          state.books = parsed.books || [];
          state.chapters = parsed.chapters || [];
          state.checkinDates = parsed.checkinDates || [];
        }
      }
    }catch(e){}
    state.loaded = true;
    render();
  }

  var saveTimeout = null;
  function persist(){
    try{
      var data = {
        books: state.books,
        chapters: state.chapters,
        checkinDates: state.checkinDates
      };
      // 保存到本地
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      // 防抖保存到云端
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(function(){
        saveToCloud(data);
      }, 2000);
    }catch(e){
      showToast('保存失败');
    }
  }

  function getChaptersForBook(bookId){
    return state.chapters
      .filter(function(c){ return c.bookId === bookId; })
      .sort(function(a,b){
        var ao = (typeof a.order === 'number') ? a.order : (a.createdAt || 0);
        var bo = (typeof b.order === 'number') ? b.order : (b.createdAt || 0);
        return ao - bo;
      });
  }

  function getReadingActivity(){
    // 统计最近8周每天的阅读活动（打卡 + 添加/编辑笔记）
    var activity = {};
    var today = new Date();
    var eightWeeksAgo = new Date(today);
    eightWeeksAgo.setDate(today.getDate() - 56); // 8周前

    // 加入打卡记录
    state.checkinDates.forEach(function(dateStr){
      if (activity[dateStr]){
        activity[dateStr] += 2; // 打卡权重更高
      } else {
        activity[dateStr] = 2;
      }
    });

    // 加入笔记活动
    state.chapters.forEach(function(ch){
      var date = new Date(ch.createdAt || ch.updatedAt || 0);
      if (date >= eightWeeksAgo && date <= today){
        var key = date.toISOString().split('T')[0];
        activity[key] = (activity[key] || 0) + 1;
      }
    });

    // 也统计读书状态变化
    state.books.forEach(function(book){
      if (book.updatedAt){
        var date = new Date(book.updatedAt);
        if (date >= eightWeeksAgo && date <= today){
          var key = date.toISOString().split('T')[0];
          activity[key] = (activity[key] || 0) + 0.5;
        }
      }
    });

    return activity;
  }

  function getHeatmapLevel(count){
    if (!count || count === 0) return 0;
    if (count >= 3) return 4;
    if (count >= 2) return 3;
    if (count >= 1.5) return 2;
    return 1;
  }

  function getCurrentStreak(){
    var stored = localStorage.getItem(STORAGE_KEY);
    var parsed = stored ? JSON.parse(stored) : {};
    var checkinDates = parsed.checkinDates || [];

    var streak = 0;
    var today = new Date();
    var todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');

    for (var i = 0; i < 365; i++){
      var d = new Date(today);
      d.setDate(today.getDate() - i);
      var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      if (checkinDates.indexOf(key) !== -1){
        streak++;
      } else if (i > 0) {
        break;
      }
    }
    return streak;
  }

  function doCheckin(){
    var d = new Date();
    var today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (state.checkinDates.indexOf(today) === -1){
      state.checkinDates.push(today);
      persist();
      showToast('打卡成功！今日已读');
      render();
    }
  }

  function isCheckedInToday(){
    var d = new Date();
    var today = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return state.checkinDates.indexOf(today) !== -1;
  }

  function renderCheckin(){
    var checked = isCheckedInToday();
    var streak = getCurrentStreak();
    return ''
    + '<div class="checkin-bar">'
    +   '<span class="checkin-streak">连续打卡 <strong>' + streak + '</strong> 天</span>'
    +   '<button class="checkin-btn' + (checked ? ' checked' : '') + '" data-action="do-checkin"' + (checked ? ' disabled' : '') + '>'
    +     '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    +     (checked ? '已完成' : '打卡')
    +   '</button>'
    + '</div>';
  }

  function renderHeatmap(){
    var streak = getCurrentStreak();
    var collapsed = state.heatmapCollapsed ? 'collapsed' : '';

    // 获取本周（周一到周日）的数据
    var days = ['一','二','三','四','五','六','日'];
    var today = new Date();
    var todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    // 找到本周周一
    var dayOfWeek = today.getDay(); // 0=周日, 1=周一...
    var mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
    var monday = new Date(todayDate);
    monday.setDate(todayDate.getDate() + mondayOffset);

    var weekData = [];

    var stored = localStorage.getItem(STORAGE_KEY);
    var parsed = stored ? JSON.parse(stored) : {};
    var checkinDates = parsed.checkinDates || [];

    for (var i = 0; i < 7; i++){
      var d = new Date(monday);
      d.setDate(monday.getDate() + i);
      var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      var hasActivity = checkinDates.indexOf(key) !== -1;
      var isToday = key === (today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0'));
      weekData.push({
        day: days[i],
        date: String(d.getDate()),
        has: hasActivity,
        today: isToday
      });
    }

    var html = ''
    + '<div class="heatmap-section">'
    +   '<div class="section-label section-toggle ' + collapsed + '" data-action="toggle-heatmap">'
    +     '<h3><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>本周阅读</h3>'
    +     '<svg class="arrow icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>'
    +   '</div>'
    +   '<div class="heatmap-bar">';
    weekData.forEach(function(w){
      html += '<div class="heatmap-bar-day' + (w.has ? ' has' : '') + (w.today ? ' today' : '') + '"></div>';
    });
    html += '</div>'
    +   '<div class="heatmap-bar-labels">';
    weekData.forEach(function(w){
      html += '<span' + (w.today ? ' style="font-weight:600;color:var(--navy)"' : '') + '>' + w.date + '日(' + w.day + ')</span>';
    });
    html += '</div>'
    +   '<div class="heatmap-legend">'
    +     '<span class="' + (weekData[6].has ? 'active' : '') + '"></span> 有阅读'
    +   '</div>'
    + '</div>';
    return html;
  }

  // initHeatmap 不再需要，简化版直接渲染

  /* ---------- actions ---------- */

  function addBook(title, author, status, progress){
    var book = {
      id: uid(),
      title: title.trim(),
      author: author.trim(),
      status: status || 'want',
      progress: (status === 'reading') ? clampProgress(progress) : (status === 'done' ? 100 : 0),
      createdAt: Date.now()
    };
    state.books.unshift(book);
    state.showAddBook = false;
    state.draftBookTitle = '';
    state.draftBookAuthor = '';
    state.draftBookStatus = 'want';
    state.draftBookProgress = 0;
    persist();
    render();
    showToast('已添加《' + book.title + '》');
  }

  function clampProgress(v){
    v = parseInt(v, 10);
    if (isNaN(v)) v = 0;
    return Math.max(0, Math.min(100, v));
  }

  function setBookStatus(bookId, status){
    var book = state.books.find(function(b){ return b.id === bookId; });
    if (!book) return;
    book.status = status;
    if (status === 'done') book.progress = 100;
    if (status === 'want') book.progress = 0;
    if (status === 'reading' && (!book.progress || book.progress === 100)) book.progress = book.progress === 100 ? 100 : 0;
    persist();
    render();
  }

  function setBookProgress(bookId, progress){
    var book = state.books.find(function(b){ return b.id === bookId; });
    if (!book) return;
    book.progress = clampProgress(progress);
    if (book.progress >= 100){ book.progress = 100; book.status = 'done'; }
    persist();
    render();
  }

  function deleteBook(bookId){
    state.books = state.books.filter(function(b){ return b.id !== bookId; });
    state.chapters = state.chapters.filter(function(c){ return c.bookId !== bookId; });
    state.pendingDelete = null;
    state.view = 'library';
    state.selectedBookId = null;
    persist();
    render();
    showToast('已删除该书');
  }

  function addChapter(bookId, title, quote, content){
    var existing = getChaptersForBook(bookId);
    var maxOrder = existing.reduce(function(max, c){
      return Math.max(max, (typeof c.order === 'number') ? c.order : 0);
    }, -1);
    var chapter = {
      id: uid(),
      bookId: bookId,
      title: title.trim(),
      quote: (quote || '').trim(),
      content: content.trim(),
      order: maxOrder + 1,
      createdAt: Date.now(),
      updatedAt: Date.now()
    };
    state.chapters.push(chapter);
    state.showAddChapter = false;
    state.openChapterId = chapter.id;
    persist();
    render();
    showToast('已添加章节');
  }

  function reorderChapters(bookId, draggedId, targetId, insertAfter){
    var ordered = getChaptersForBook(bookId);
    var draggedIdx = ordered.findIndex(function(c){ return c.id === draggedId; });
    if (draggedIdx === -1) return;
    var dragged = ordered.splice(draggedIdx, 1)[0];
    var targetIdx = ordered.findIndex(function(c){ return c.id === targetId; });
    if (targetIdx === -1){
      ordered.push(dragged);
    } else {
      ordered.splice(insertAfter ? targetIdx + 1 : targetIdx, 0, dragged);
    }
    ordered.forEach(function(c, idx){ c.order = idx; });
    persist();
    render();
  }

  function updateChapter(chapterId, title, quote, content){
    var ch = state.chapters.find(function(c){ return c.id === chapterId; });
    if (ch){
      ch.title = title.trim();
      ch.quote = (quote || '').trim();
      ch.content = content.trim();
      ch.updatedAt = Date.now();
    }
    state.editingChapterId = null;
    persist();
    render();
    showToast('已保存');
  }

  function deleteChapter(chapterId){
    state.chapters = state.chapters.filter(function(c){ return c.id !== chapterId; });
    state.pendingDelete = null;
    persist();
    render();
    showToast('已删除该章节');
  }

  /* ---------- rendering ---------- */

  function render(){
    var app = document.getElementById('app');
    if (!state.loaded){
      app.innerHTML = '<div class="loading-state">正在打开书架…</div>';
      return;
    }
    if (state.view === 'book' && state.selectedBookId){
      app.innerHTML = renderHeader() + renderBookDetail();
    } else {
      app.innerHTML = renderHeader() + renderLibrary();
    }
    bindEvents();
  }

  function renderHeader(){
    var headerBtns = '';
    if (state.view === 'library'){
      headerBtns = '<button class="btn btn-ghost" data-action="export-all" title="导出全部笔记"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>导出</button>'
        + '<button class="btn btn-ghost" data-action="import-backup" title="从备份恢复"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>导入</button>'
        + '<input type="file" id="importFileInput" accept=".json" style="display:none" data-action="import-file">'
        + '<button class="btn btn-primary" data-action="open-add-book"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>添加书本</button>';
    }
    return ''
    + '<div class="app-header">'
    +   '<div class="brand">'
    +     '<div class="brand-mark"></div>'
    +     '<div><h1 class="serif">书斋</h1><p>记录读过的每一本书，梳理每一章的收获</p></div>'
    +   '</div>'
    +   '<div class="header-actions">' + headerBtns + '</div>'
    + '</div>'
    + (state.view === 'library' && state.books.length > 0
      ? '<div class="search-box">'
        + '<svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>'
        + '<input type="text" id="search-input" placeholder="搜索书名、作者或笔记内容" value="' + escapeHtml(state.searchQuery) + '">'
        + (state.searchQuery ? '<button class="search-clear" data-action="clear-search" aria-label="清除搜索"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>' : '')
        + '</div>'
      : '');
  }

  function getStats(){
    var done = state.books.filter(function(b){ return b.status === 'done'; }).length;
    var reading = state.books.filter(function(b){ return b.status === 'reading'; }).length;
    var notes = state.chapters.filter(function(c){ return c.content && c.content.trim(); }).length;
    var quotes = state.chapters.filter(function(c){ return c.quote && c.quote.trim(); }).length;
    return { done: done, reading: reading, notes: notes, quotes: quotes };
  }

  function getRandomChapter(){
    var chaptersWithContent = state.chapters.filter(function(c){ return c.content && c.content.trim(); });
    if (chaptersWithContent.length === 0) return null;
    var randomIdx = Math.floor(Math.random() * chaptersWithContent.length);
    return chaptersWithContent[randomIdx];
  }

  function getQuoteWall(){
    var quotes = [];
    state.chapters.forEach(function(ch){
      if (ch.quote && ch.quote.trim()){
        var book = state.books.find(function(b){ return b.id === ch.bookId; });
        quotes.push({
          text: ch.quote,
          bookTitle: book ? book.title : '',
          chapterTitle: ch.title
        });
      }
    });
    return quotes;
  }

  function renderStats(){
    var stats = getStats();
    var collapsed = state.statsCollapsed ? 'collapsed' : '';
    return ''
    + '<div class="stats-bar">'

  function highlight(text, query){
    var escaped = escapeHtml(text);
    if (!query) return escaped;
    var escapedQuery = escapeHtml(query).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp('(' + escapedQuery + ')', 'ig'), '<mark>$1</mark>');
  }

  function snippetAround(text, query){
    var lower = text.toLowerCase();
    var idx = lower.indexOf(query.toLowerCase());
    if (idx === -1) return text.slice(0, 80);
    var start = Math.max(0, idx - 30);
    var end = Math.min(text.length, idx + query.length + 50);
    return (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
  }

  function renderSearchResults(query){
    var q = query.toLowerCase();
    var hits = [];

    state.books.forEach(function(book){
      var bookMatch = book.title.toLowerCase().indexOf(q) !== -1 || (book.author || '').toLowerCase().indexOf(q) !== -1;
      var chapters = getChaptersForBook(book.id);
      var chapterHitFound = false;

      chapters.forEach(function(ch){
        var inTitle = ch.title.toLowerCase().indexOf(q) !== -1;
        var inQuote = (ch.quote || '').toLowerCase().indexOf(q) !== -1;
        var inContent = (ch.content || '').toLowerCase().indexOf(q) !== -1;
        if (inTitle || inQuote || inContent){
          chapterHitFound = true;
          var snippetSource = inQuote ? ch.quote : (inContent ? ch.content : ch.title);
          hits.push({
            bookId: book.id,
            chapterId: ch.id,
            bookTitle: book.title,
            title: ch.title,
            snippet: snippetAround(snippetSource, query)
          });
        }
      });

      if (bookMatch && !chapterHitFound){
        hits.push({
          bookId: book.id,
          chapterId: null,
          bookTitle: null,
          title: book.title,
          snippet: book.author || ''
        });
      }
    });

    var html = '<div class="shelf-label"><span>找到 ' + hits.length + ' 条结果</span></div>';
    if (hits.length === 0){
      html += '<div class="empty" style="padding:48px 20px;"><p style="margin:0;">没有找到匹配的书本或笔记，换个关键词试试。</p></div>';
      return html;
    }
    html += '<div class="search-results">';
    hits.forEach(function(hit){
      html += '<div class="search-hit" data-action="open-search-hit" data-book-id="' + hit.bookId + '"' + (hit.chapterId ? ' data-chapter-id="' + hit.chapterId + '"' : '') + '>'
        + (hit.bookTitle ? '<p class="hit-book">' + escapeHtml(hit.bookTitle) + '</p>' : '')
        + '<h4>' + highlight(hit.title, query) + '</h4>'
        + (hit.snippet ? '<p>' + highlight(hit.snippet, query) + '</p>' : '')
        + '</div>';
    });
    html += '</div>';
    return html;
  }

  /* ---------- events ---------- */

  function bindEvents(){
    var app = document.getElementById('app');
    app.onclick = function(e){
      var target = e.target.closest('[data-action]');
      if (!target) return;
      var action = target.getAttribute('data-action');
      var id = target.getAttribute('data-id');

      switch(action){
        case 'open-add-book':
          state.showAddBook = true;
          state.draftBookTitle = '';
          state.draftBookAuthor = '';
          state.draftBookStatus = 'want';
          state.draftBookProgress = 0;
          render();
          setTimeout(function(){ var el = document.getElementById('new-book-title'); if (el) el.focus(); }, 0);
          break;
        case 'cancel-add-book':
          state.showAddBook = false;
          render();
          break;
        case 'submit-add-book':
          submitAddBook();
          break;
        case 'set-draft-status':
          syncDraftBookFromDom();
          state.draftBookStatus = target.getAttribute('data-status');
          render();
          setTimeout(function(){ var el = document.getElementById('new-book-title'); if (el) el.focus(); }, 0);
          break;
        case 'filter-library':
          state.libraryFilter = target.getAttribute('data-filter');
          render();
          break;
        case 'set-book-status':
          setBookStatus(id, target.getAttribute('data-status'));
          break;
        case 'open-book':
          state.view = 'book';
          state.selectedBookId = id;
          state.openChapterId = null;
          state.editingChapterId = null;
          state.showAddChapter = false;
          state.pendingDelete = null;
          render();
          window.scrollTo(0,0);
          break;
        case 'back-to-library':
          state.view = 'library';
          state.selectedBookId = null;
          state.pendingDelete = null;
          render();
          break;
        case 'delete-book':
          if (state.pendingDelete && state.pendingDelete.type === 'book' && state.pendingDelete.id === id){
            deleteBook(id);
          } else {
            state.pendingDelete = {type:'book', id:id};
            render();
          }
          break;
        case 'open-add-chapter':
          state.showAddChapter = true;
          render();
          setTimeout(function(){ var el = document.getElementById('new-chapter-title'); if (el) el.focus(); }, 0);
          break;
        case 'cancel-add-chapter':
          state.showAddChapter = false;
          render();
          break;
        case 'submit-add-chapter':
          submitAddChapter();
          break;
        case 'toggle-chapter':
          if (state.editingChapterId === id) break;
          if (e.target.closest('.drag-handle')) break;
          state.openChapterId = (state.openChapterId === id) ? null : id;
          render();
          break;
        case 'edit-chapter':
          state.openChapterId = id;
          state.editingChapterId = id;
          render();
          setTimeout(function(){ var el = document.getElementById('edit-content-' + id); if (el) el.focus(); }, 0);
          break;
        case 'cancel-edit-chapter':
          state.editingChapterId = null;
          render();
          break;
        case 'save-chapter':
          submitEditChapter(id);
          break;
        case 'delete-chapter':
          if (state.pendingDelete && state.pendingDelete.type === 'chapter' && state.pendingDelete.id === id){
            deleteChapter(id);
          } else {
            state.pendingDelete = {type:'chapter', id:id};
            render();
          }
          break;
        case 'clear-search':
          state.searchQuery = '';
          render();
          break;
        case 'open-search-hit':
          state.view = 'book';
          state.selectedBookId = target.getAttribute('data-book-id');
          state.openChapterId = target.getAttribute('data-chapter-id') || null;
          state.editingChapterId = null;
          state.showAddChapter = false;
          state.pendingDelete = null;
          state.searchQuery = '';
          render();
          window.scrollTo(0,0);
          break;
        case 'export-all':
          exportMarkdown();
          break;
        case 'export-book':
          exportMarkdown(id);
          break;
        case 'import-backup':
          document.getElementById('importFileInput').click();
          break;
        case 'import-file':
          var fileInput = document.getElementById('importFileInput');
          if (fileInput && fileInput.files && fileInput.files[0]){
            importBackup(fileInput.files[0]);
          }
          break;
        case 'toggle-quote-wall':
          state.quoteWallCollapsed = !state.quoteWallCollapsed;
          render();
          break;
        case 'toggle-review':
          state.reviewCollapsed = !state.reviewCollapsed;
          render();
          break;
        case 'refresh-review':
          state.reviewChapterId = null;
          render();
          break;
        case 'toggle-heatmap':
          state.heatmapCollapsed = !state.heatmapCollapsed;
          render();
          break;
        case 'do-checkin':
          if (!isCheckedInToday()){
            doCheckin();
          }
          break;
      }
    };

    // Enter-to-submit on single-line title inputs
    var newBookTitle = document.getElementById('new-book-title');
    if (newBookTitle){
      newBookTitle.addEventListener('keydown', function(e){ if (e.key === 'Enter') submitAddBook(); });
    }
    var newChapterTitle = document.getElementById('new-chapter-title');
    if (newChapterTitle){
      newChapterTitle.addEventListener('keydown', function(e){ if (e.key === 'Enter') { e.preventDefault(); document.getElementById('new-chapter-content').focus(); } });
    }

    // reading-progress slider
    var slider = document.getElementById('progress-slider');
    if (slider){
      slider.addEventListener('input', function(){
        var label = document.getElementById('progress-value-label');
        if (label) label.textContent = slider.value + '%';
      });
      slider.addEventListener('change', function(){
        setBookProgress(slider.getAttribute('data-id'), slider.value);
      });
    }

    // search input
    var searchInput = document.getElementById('search-input');
    if (searchInput){
      var isComposing = false;
      function handleSearchInput(){
        var cursor = searchInput.selectionStart;
        state.searchQuery = searchInput.value;
        render();
        var el = document.getElementById('search-input');
        if (el){ el.focus(); el.setSelectionRange(cursor, cursor); }
      }
      searchInput.addEventListener('compositionstart', function(){ isComposing = true; });
      searchInput.addEventListener('compositionend', function(){
        isComposing = false;
        handleSearchInput();
      });
      searchInput.addEventListener('input', function(e){
        if (isComposing || e.isComposing) return;
        handleSearchInput();
      });
    }

    // chapter drag-to-reorder
    app.ondragstart = function(e){
      var handle = e.target.closest('.chapter-head');
      if (!handle){ e.preventDefault(); return; }
      var row = handle.closest('.chapter-row');
      if (!row) return;
      draggedChapterId = row.getAttribute('data-chapter-id');
      e.dataTransfer.effectAllowed = 'move';
      try{ e.dataTransfer.setData('text/plain', draggedChapterId); }catch(err){}
      setTimeout(function(){ row.classList.add('dragging'); }, 0);
    };
    app.ondragover = function(e){
      if (!draggedChapterId) return;
      var row = e.target.closest('.chapter-row');
      if (!row) return;
      e.preventDefault();
      clearDragOverClasses();
      var rect = row.getBoundingClientRect();
      var isTopHalf = (e.clientY - rect.top) < rect.height / 2;
      row.classList.add(isTopHalf ? 'drag-over-top' : 'drag-over-bottom');
    };
    app.ondrop = function(e){
      if (!draggedChapterId) return;
      var row = e.target.closest('.chapter-row');
      clearDragOverClasses();
      if (row){
        e.preventDefault();
        var targetId = row.getAttribute('data-chapter-id');
        var rect = row.getBoundingClientRect();
        var insertAfter = (e.clientY - rect.top) >= rect.height / 2;
        if (targetId !== draggedChapterId){
          reorderChapters(state.selectedBookId, draggedChapterId, targetId, insertAfter);
        }
      }
      draggedChapterId = null;
    };
    app.ondragend = function(){
      draggedChapterId = null;
      clearDragOverClasses();
      var draggingEl = document.querySelector('.chapter-row.dragging');
      if (draggingEl) draggingEl.classList.remove('dragging');
    };
  }

  function clearDragOverClasses(){
    var els = document.querySelectorAll('.chapter-row.drag-over-top, .chapter-row.drag-over-bottom');
    for (var i=0;i<els.length;i++){ els[i].classList.remove('drag-over-top','drag-over-bottom'); }
  }

  function buildMarkdown(bookIdFilter){
    var books = bookIdFilter ? state.books.filter(function(b){ return b.id === bookIdFilter; }) : state.books;
    var lines = ['# 书斋读书笔记', ''];
    books.forEach(function(b){
      var meta = STATUS_META[b.status || 'want'];
      lines.push('## ' + b.title + (b.author ? '（' + b.author + '）' : ''));
      lines.push('');
      lines.push('- 状态：' + meta.label + (b.status === 'reading' ? '，进度 ' + clampProgress(b.progress || 0) + '%' : ''));
      lines.push('');
      var chapters = getChaptersForBook(b.id);
      if (chapters.length === 0){
        lines.push('_暂无章节笔记_');
        lines.push('');
      } else {
        chapters.forEach(function(ch, idx){
          lines.push('### ' + (idx + 1) + '. ' + ch.title);
          if (ch.quote){
            lines.push('> ' + ch.quote);
            lines.push('');
          }
          lines.push(ch.content || '_暂无总结_');
          lines.push('');
        });
      }
    });
    return lines.join('\n');
  }

  function exportMarkdown(bookIdFilter){
    if (state.books.length === 0){
      showToast('还没有可导出的内容');
      return;
    }
    var md = buildMarkdown(bookIdFilter);
    var targetBook = bookIdFilter ? state.books.find(function(b){ return b.id === bookIdFilter; }) : null;
    var filename = targetBook ? (targetBook.title + '-读书笔记.md') : '书斋读书笔记.md';
    try{
      var blob = new Blob([md], {type: 'text/markdown;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      showToast('已导出 Markdown 文件');
    }catch(e){
      showToast('导出失败，请重试');
    }
  }

  function exportBackup(){
    if (state.books.length === 0 && state.chapters.length === 0){
      showToast('还没有数据');
      return;
    }
    var data = {
      books: state.books,
      chapters: state.chapters,
      exportTime: new Date().toISOString()
    };
    try{
      var blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = '书斋备份_' + new Date().toLocaleDateString('zh-CN').replace(/\//g, '-') + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
      showToast('备份已导出');
    }catch(e){
      showToast('导出失败');
    }
  }

  function importBackup(file){
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e){
      try{
        var data = JSON.parse(e.target.result);
        if (data.books && Array.isArray(data.books)){
          state.books = data.books;
          state.chapters = data.chapters || [];
          persist();
          render();
          showToast('已恢复 ' + state.books.length + ' 本书');
        } else {
          showToast('文件格式不正确');
        }
      }catch(err){
        showToast('导入失败');
      }
    };
    reader.readAsText(file);
  }

  function syncDraftBookFromDom(){
    var titleEl = document.getElementById('new-book-title');
    var authorEl = document.getElementById('new-book-author');
    var progressEl = document.getElementById('new-book-progress');
    if (titleEl) state.draftBookTitle = titleEl.value;
    if (authorEl) state.draftBookAuthor = authorEl.value;
    if (progressEl) state.draftBookProgress = clampProgress(progressEl.value);
  }

  function submitAddBook(){
    var titleEl = document.getElementById('new-book-title');
    var authorEl = document.getElementById('new-book-author');
    var progressEl = document.getElementById('new-book-progress');
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写书名');
      if (titleEl) titleEl.focus();
      return;
    }
    addBook(title, authorEl ? authorEl.value : '', state.draftBookStatus || 'want', progressEl ? progressEl.value : state.draftBookProgress);
  }

  function submitAddChapter(){
    var titleEl = document.getElementById('new-chapter-title');
    var quoteEl = document.getElementById('new-chapter-quote');
    var contentEl = document.getElementById('new-chapter-content');
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写章节标题');
      if (titleEl) titleEl.focus();
      return;
    }
    addChapter(state.selectedBookId, title, quoteEl ? quoteEl.value : '', contentEl ? contentEl.value : '');
  }

  function submitEditChapter(chapterId){
    var titleEl = document.getElementById('edit-title-' + chapterId);
    var quoteEl = document.getElementById('edit-quote-' + chapterId);
    var contentEl = document.getElementById('edit-content-' + chapterId);
    var title = titleEl ? titleEl.value : '';
    if (!title || !title.trim()){
      showToast('请填写章节标题');
      if (titleEl) titleEl.focus();
      return;
    }
    updateChapter(chapterId, title, quoteEl ? quoteEl.value : '', contentEl ? contentEl.value : '');
  }

  /* ---------- login ---------- */

  function initLogin(){
    var savedPassword = localStorage.getItem(PASSWORD_KEY);

    if (!savedPassword){
      document.getElementById('loginDesc').textContent = '设置登录密码，保护你的书架';
      document.getElementById('passwordInput').placeholder = '设置登录密码';
      document.getElementById('loginHint').textContent = '首次使用将自动设置为登录密码';
    } else {
      document.getElementById('loginDesc').textContent = '输入密码解锁你的书架';
      document.getElementById('passwordInput').placeholder = '请输入密码';
      document.getElementById('loginHint').textContent = '';
    }

    document.getElementById('unlockBtn').onclick = function(){
      var password = document.getElementById('passwordInput').value;
      if (!password){
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '请输入密码';
        return;
      }

      if (!savedPassword){
        localStorage.setItem(PASSWORD_KEY, password);
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadData();
        return;
      }

      if (password === savedPassword){
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadData();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '密码错误，请重试';
      }
    };

    document.getElementById('passwordInput').onkeydown = function(e){
      if (e.key === 'Enter') document.getElementById('unlockBtn').click();
    };

    // 忘记密码
    document.getElementById('forgotPwdBtn').onclick = function(e){
      e.preventDefault();
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('resetPwdScreen').style.display = 'flex';
      document.getElementById('newPwdInput').value = '';
      document.getElementById('confirmPwdInput').value = '';
      document.getElementById('resetPwdError').style.display = 'none';
      document.getElementById('newPwdInput').focus();
    };

    // 取消重置
    document.getElementById('cancelResetBtn').onclick = function(){
      document.getElementById('resetPwdScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    };

    // 确认重置
    document.getElementById('resetPwdBtn').onclick = function(){
      var newPwd = document.getElementById('newPwdInput').value;
      var confirmPwd = document.getElementById('confirmPwdInput').value;
      var errorEl = document.getElementById('resetPwdError');

      if (!newPwd){
        errorEl.style.display = 'block';
        errorEl.textContent = '请输入新密码';
        return;
      }
      if (newPwd.length < 4){
        errorEl.style.display = 'block';
        errorEl.textContent = '密码至少4个字符';
        return;
      }
      if (newPwd !== confirmPwd){
        errorEl.style.display = 'block';
        errorEl.textContent = '两次密码不一致';
        return;
      }

      // 清空所有数据
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(PASSWORD_KEY);

      // 设置新密码
      localStorage.setItem(PASSWORD_KEY, newPwd);

      // 回到登录界面
      document.getElementById('resetPwdScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      document.getElementById('loginDesc').textContent = '密码已重置，请重新登录';
      document.getElementById('passwordInput').placeholder = '请输入密码';
      document.getElementById('loginHint').textContent = '';
    };

    // 回车提交重置表单
    document.getElementById('confirmPwdInput').onkeydown = function(e){
      if (e.key === 'Enter') document.getElementById('resetPwdBtn').click();
    };
  }

  /* ---------- 启动 ---------- */
  function initLogin(){
    // 跳过登录，直接加载数据
    document.getElementById('app').style.display = 'block';
    loadData();
  }

  initLogin();
})();
</script>
